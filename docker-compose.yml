version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: admorph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - admorph_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  admorph_pg:
