<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Fashion Editorial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary: {% if brand_primary %}{{ brand_primary }}{% else %}{{ theme.primary_color }}{% endif %};
            --secondary: {% if brand_secondary %}{{ brand_secondary }}{% else %}{{ theme.secondary_color }}{% endif %};
            --accent: {% if brand_accent %}{{ brand_accent }}{% else %}{{ theme.text_color }}{% endif %};
            --font-head: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --bg-color: var(--secondary);
        }

        /* Swap text and secondary if dark theme for contrast */
        {% if theme.background_texture == 'noise' %}
            .noise-overlay {
                position: absolute; inset: 0; pointer-events: none; opacity: 0.15; z-index: 100;
                background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgMjAwIiB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC42NSIgbnVtT2N0YXZlcz0iMyIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNuKSIgb3BhY2l0eT0iMC40Ii8+PC9zdmc+');
            }
        {% endif %}

        body, html {
            margin: 0; padding: 0;
            width: {{ ratio.width }}px;
            height: {{ ratio.height }}px;
            background-color: var(--bg-color);
            color: var(--primary);
            overflow: hidden;
            position: relative;
        }

        /* Symmetrical Framing */
        .frame {
            position: absolute;
            inset: 3vw;
            border: 1px solid rgba(0,0,0,0.1);
            border-color: var(--primary);
            opacity: 0.5;
            z-index: 10;
            pointer-events: none;
        }

        /* Visual Composition */
        .image-container {
            position: absolute;
            {% if ratio.width > ratio.height %}
            right: 0%; top: 0%;
            width: 65%; height: 100%;
            {% else %}
            top: 0; left: 0%;
            width: 100%; height: 60%;
            {% endif %}
            overflow: hidden;
            z-index: 1;
        }

        .image-container img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(20%) contrast(1.1); /* Editorial treatment */
        }
        
        .overlay-gradient {
            position: absolute; inset: 0; z-index: 2;
            {% if ratio.width > ratio.height %}
            background: linear-gradient(to right, var(--secondary) 0%, transparent 60%);
            {% else %}
            background: linear-gradient(to bottom, var(--secondary) 0%, transparent 60%);
            {% endif %}
        }

        /* Typography */
        .content-box {
            position: absolute;
            z-index: 5;
            {% if ratio.width > ratio.height %}
            left: 5%; top: 50%; transform: translateY(-50%);
            width: 50%;
            {% else %}
            bottom: 5%; left: 5%;
            width: 90%;
            {% endif %}
        }

        .catchy {
            font-family: var(--font-body);
            font-size: clamp(0.8rem, 1cqi, 1rem);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
            opacity: 0.7;
            position: relative;
            padding-left: 30px;
        }
        .catchy::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 15px; height: 1px; background: var(--primary);
        }

        h1 {
            font-family: var(--font-head);
            font-size: clamp(3rem, 10cqi, 7rem);
            font-weight: 400;
            font-style: italic;
            line-height: 1.05;
            margin: 0 0 2rem 0;
            /* Negative margin allows overlap */
            {% if ratio.width > ratio.height %}
            margin-right: -20%;
            {% else %}
            margin-top: -10%;
            {% endif %}
            text-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 20; position: relative;
        }

        .body-text {
            font-family: var(--font-body);
            font-size: clamp(1rem, 2cqi, 1.2rem);
            line-height: 1.6;
            font-weight: 300;
            max-width: 80%;
            margin-bottom: 2rem;
            opacity: 0.85;
        }

        .cta-box {
            display: inline-flex;
            align-items: center;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 5px;
            font-family: var(--font-body);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: clamp(0.9rem, 1.2cqi, 1.1rem);
            gap: 10px;
        }

    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="frame"></div>
    
    <div class="image-container">
        <div class="overlay-gradient"></div>
        <img src="{{ product_image }}" alt="Editorial" class="reveal-img">
    </div>

    <div class="content-box">
        <div class="catchy reveal-txt">{{ catchy_line }}</div>
        <h1 class="reveal-hd">{{ heading }}</h1>
        <div class="body-text reveal-txt">{{ content }}</div>
        <div class="cta-box reveal-txt">
            {{ cta }}
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
    </div>

    {% if render_mode != 'static' %}
        {% if vo_urls %}
        <div style="display:none">
            <audio id="vo-catchy" src="{{ vo_urls.catchy }}"></audio>
            <audio id="vo-heading" src="{{ vo_urls.heading }}"></audio>
            <audio id="vo-content" src="{{ vo_urls.content }}"></audio>
            <audio id="vo-cta" src="{{ vo_urls.cta }}"></audio>
        </div>
        {% endif %}
        
        <script>
            // Audio System
            const hasMP3 = "{{ 'true' if vo_urls else 'false' }}" === 'true';
            const startNarrative = () => {
                if (hasMP3) {
                    setTimeout(() => document.getElementById('vo-catchy')?.play(), 1000);
                    setTimeout(() => document.getElementById('vo-heading')?.play(), 3000);
                    setTimeout(() => document.getElementById('vo-content')?.play(), 6000);
                    setTimeout(() => document.getElementById('vo-cta')?.play(), 8500);
                }
            };
            window.addEventListener('message', (e) => {
                if (e.data && e.data.type === 'PLAY_AUDIO') startNarrative();
            });

            // GSAP Animations
            document.addEventListener('DOMContentLoaded', () => {
                // Initial states
                gsap.set('.reveal-img', { scale: 1.1, opacity: 0 });
                gsap.set('.reveal-txt', { y: 30, opacity: 0 });
                gsap.set('.reveal-hd', { y: 50, opacity: 0, rotationX: -10 });
                gsap.set('.frame', { opacity: 0, scale: 0.98 });

                // Elegant Timeline
                const tl = gsap.timeline({ delay: 0.3 });
                tl.to('.frame', { opacity: 0.5, scale: 1, duration: 2, ease: "power2.out" })
                  .to('.reveal-img', { scale: 1, opacity: 1, duration: 2.5, ease: "power3.out" }, "-=1.5")
                  .to('.reveal-txt', { y: 0, opacity: 1, duration: 1.5, stagger: 0.2, ease: "slow(0.7, 0.7, false)" }, "-=2")
                  .to('.reveal-hd', { y: 0, opacity: 1, rotationX: 0, duration: 2, ease: "power4.out" }, "-=2.2");
            });
        </script>
    {% endif %}
</body>
</html>
