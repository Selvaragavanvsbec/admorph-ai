<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brutalist Raw Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=IBM+Plex+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: {% if brand_primary %}{{ brand_primary }}{% else %}{{ theme.primary_color }}{% endif %};
            --secondary: {% if brand_secondary %}{{ brand_secondary }}{% else %}{{ theme.secondary_color }}{% endif %};
            --accent: {% if brand_accent %}{{ brand_accent }}{% else %}{{ theme.accent_color or '#ff7b54' }}{% endif %};
            --font-head: 'Archivo',
            sans-serif;
            --font-mono: 'IBM Plex Mono',
            monospace;
        }

        body,
        html {
            margin: 0;
            padding: 0;

            width: {{ ratio.width }}px;

            height: {{ ratio.height }}px;
            font-family: var(--font-head);
            background-color: #e0e0e0;
            color: #000;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            position: relative;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border: 20px solid #000;
            box-sizing: border-box;
            background: #fff;
        }

        .top-bar {
            height: 100px;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 40px;
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: bold;
        }

        h1 {
            font-size: {{ (ratio.width / 8)|int }}px;
            line-height: 0.85;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            padding: 40px;
            background: #000;
            color: #fff;
            align-self: flex-start;
            margin-top: -20px;
            margin-left: 40px;
            box-shadow: 20px 20px 0px var(--secondary);
        }

        .product-image {
            max-width: 80%;
            max-height: 300px;
            object-fit: contain;
            margin: 40px;
            border: 10px solid #000;
            background: #fff;
        }

        .cta-container {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            padding: 60px;
        }

        .cta {
            background: #000;
            color: #fff;
            padding: 30px 60px;
            font-size: 32px;
            text-decoration: none;
            font-weight: 900;
            border: 5px solid #000;
            transition: 0.1s;
        }

        .cta:hover {
            background: #fff;
            color: #000;
        }

        .index-marks {
            position: absolute;
            top: 120px;
            right: 40px;
            font-family: var(--font-mono);
            font-size: 14px;
            text-align: right;
            transform: rotate(90deg);
            transform-origin: top right;
        }
    
        .catchy-line {
            font-size: clamp(0.9rem, 1.5cqi, 1.5rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--secondary);
            margin-bottom: -10px;
            opacity: 0;
            margin-left: 40px;
            {% if render_mode != 'static' %}
            animation: heavySlam 0.4s cubic-bezier(0.13, 0.9, 0.4, 1) forwards;
            animation-delay: 5s;
            {% else %}
            opacity: 0.8;
            {% endif %}
        }

        /* 10-Second Industrial Narrative */
        @keyframes heavySlam {
            0% { transform: scale(5); opacity: 0; filter: blur(10px); }
            80% { transform: scale(0.95); opacity: 1; filter: blur(0); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, -5px); }
            20%, 40%, 60%, 80% { transform: translate(5px, 5px); }
        }

        @keyframes indexPop {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes starkFlash {
            0% { filter: invert(0); }
            50% { filter: invert(1); }
            100% { filter: invert(0); }
        }

        @keyframes jitterLong {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(2px, -2px); }
            20% { transform: translate(-2px, 2px); }
            30% { transform: translate(2px, 2px); }
            40% { transform: translate(-2px, -2px); }
        }

        .container {
            {% if render_mode != 'static' %}
            animation: screenShake 0.4s ease-out forwards;
            animation-delay: 3s;
            {% endif %}
        }

        h1 {
            {% if render_mode != 'static' %}
            opacity: 0;
            animation: heavySlam 0.6s cubic-bezier(0.13, 0.9, 0.4, 1) forwards;
            animation-delay: 6s;
            {% endif %}
        }

        .cta {
            {% if render_mode != 'static' %}
            opacity: 0;
            animation: heavySlam 0.4s forwards, starkFlash 0.5s ease-out 9.5s;
            animation-delay: 8.5s;
            {% endif %}
        }

        .product-image {
            {% if render_mode != 'static' %}
            opacity: 0;
            animation: heavySlam 10s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 2s;
            {% endif %}
        }

        .index-marks span {
            display: inline-block;
            {% if render_mode != 'static' %}
            opacity: 0;
            animation: indexPop 0.3s ease-out forwards, jitterLong 4s infinite;
            {% endif %}
        }
        
        .index-marks span:nth-child(1) { animation-delay: 1s; }
        .index-marks span:nth-child(2) { animation-delay: 1.2s; }
        .index-marks span:nth-child(3) { animation-delay: 1.4s; }
        .index-marks span:nth-child(4) { animation-delay: 1.6s; }
        .index-marks span:nth-child(5) { animation-delay: 1.8s; }
        
    </style>
</head>

<body>
    <div class="container">
        <div class="top-bar">ADMORPH / BRUT / SYSTEM</div>
        {% if product_image %}
        <img src="{{ product_image }}" class="product-image" alt="Product">
        {% endif %}
        <p class="catchy-line">{{ catchy_line }}</p>
            <h1>{{ heading }}</h1>
        <p class="subheadline" style="font-size: clamp(1.2rem, 3vw, 2rem); margin-bottom: 2rem; opacity: 0.9; text-wrap: balance;">{{ content }}</p>
        <div class="cta-container">
            <a href="#" class="cta">{{ cta }}</a>
        </div>
    </div>
    <div class="index-marks">
        001-{{ ratio.name }} // RAW_OUTPUT_ENABLED
    </div>
    {% if render_mode != 'static' %}
    <div id="vo-container" style="display: none;">
        {% if vo_urls %}
        <audio id="vo-catchy" src="{{ vo_urls.catchy }}"></audio>
        <audio id="vo-heading" src="{{ vo_urls.heading }}"></audio>
        <audio id="vo-content" src="{{ vo_urls.content }}"></audio>
        {% endif %}
    </div>
    <script>
        window.addEventListener('load', () => {
            const hasVO = {% if vo_urls %}true{% else %}false{% endif %};
            if (hasVO) {
                const playVO = (id, delay) => {
                    setTimeout(() => {
                        const el = document.getElementById(id);
                        if (el) el.play().catch(e => console.log("Audio limited."));
                    }, delay);
                };
                playVO('vo-catchy', 5000);
                playVO('vo-heading', 6500);
                playVO('vo-content', 8000);
            }
        });
    </script>
    {% endif %}
</body>

</html>
