<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Grid Pro Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --primary: {% if brand_primary %}{{ brand_primary }}{% else %}{{ theme.primary_color }}{% endif %};
            --secondary: {% if brand_secondary %}{{ brand_secondary }}{% else %}{{ theme.secondary_color }}{% endif %};
            --accent: {% if brand_accent %}{{ brand_accent }}{% else %}{{ theme.text_color }}{% endif %};
            --bg-texture: {% if theme.background_texture == 'grid' %}url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxyZWN0IHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0ibm9uZSIvPgo8cGF0aCBkPSJNMCAyMEwwIDBaTTIwIDBMMCAwWiIgc3Ryb2tlPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMykiIHN0cm9rZS13aWR0aD0iMSIvPgo8L3N2Zz4='){% elif theme.background_texture == 'dots' %}url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHBhdGggZD0iTTAgMGgwdi4wMUgwVjB6bTIwIDIwaDB2LjAxaDBWMjB6IiBmaWxsPSJub25lIi8+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC40KSIvPjwvc3ZnPg=='){% else %}none{% endif %};
            --font-main: {{ theme.font_family|default('Inter') }}, sans-serif;
            --radius: {{ theme.border_radius|default('24px') }};
        }

        body, html {
            margin: 0; padding: 0;
            width: {{ ratio.width }}px;
            height: {{ ratio.height }}px;
            background-color: var(--secondary);
            background-image: var(--bg-texture);
            font-family: var(--font-main);
            display: flex;
            align-items: center; justify-content: center;
            overflow: hidden;
            color: var(--accent);
        }

        .bento-wrapper {
            width: 90%;
            height: 90%;
            display: grid;
            grid-gap: 1.5rem;
            /* Adaptive layout based on ratio */
            {% if ratio.width > ratio.height %}
            grid-template-columns: 1fr 1.5fr;
            grid-template-rows: 1fr 1fr;
            grid-template-areas: 
                "media head"
                "media foot";
            {% else %}
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas: 
                "head"
                "media"
                "foot";
            {% endif %}
        }

        .bento-card {
            background: var(--primary);
            border-radius: var(--radius);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.2);
            overflow: hidden;
            position: relative;
        }

        .card-head {
            grid-area: head;
            justify-content: flex-end;
            align-items: flex-start;
        }
        .card-media {
            grid-area: media;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            box-shadow: none;
        }
        .card-foot {
            grid-area: foot;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 2rem;
            background: var(--secondary);
            border: 2px solid var(--primary);
        }

        .image-container {
            width: 100%;
            height: 100%;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
        }
        .image-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.05); /* Pre-scale for animation */
        }

        h1 {
            font-size: clamp(2rem, 6cqi, 4rem);
            margin: 0;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--accent);
        }

        .catchy {
            font-size: clamp(0.9rem, 1.5cqi, 1.2rem);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent);
            opacity: 0.8;
            padding: 0.4em 0.8em;
            border: 1px solid var(--accent);
            border-radius: 100px;
            display: inline-block;
        }

        p.content {
            font-size: clamp(1rem, 2cqi, 1.5rem);
            opacity: 0.9;
            margin: 0;
            line-height: 1.4;
            color: var(--accent);
            max-width: 80%;
        }

        .cta-btn {
            background: var(--accent);
            color: var(--primary);
            padding: 1.2rem 3rem;
            border-radius: 100px;
            text-transform: uppercase;
            font-weight: 800;
            font-size: clamp(1rem, 1.5cqi, 1.2rem);
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

    </style>
</head>
<body>

    <div class="bento-wrapper">
        <div class="bento-card card-head">
            <div class="catchy">{{ catchy_line }}</div>
            <h1>{{ heading }}</h1>
        </div>
        
        <div class="bento-card card-media">
            <div class="image-container">
                <img src="{{ product_image }}" alt="Product Image" id="product-img">
            </div>
        </div>

        <div class="bento-card card-foot">
            <p class="content">{{ content }}</p>
            <div class="cta-btn">{{ cta }} <span>→</span></div>
        </div>
    </div>

    {% if render_mode != 'static' %}
        {% if vo_urls %}
        <div style="display:none">
            <audio id="vo-catchy" src="{{ vo_urls.catchy }}"></audio>
            <audio id="vo-heading" src="{{ vo_urls.heading }}"></audio>
            <audio id="vo-content" src="{{ vo_urls.content }}"></audio>
            <audio id="vo-cta" src="{{ vo_urls.cta }}"></audio>
        </div>
        {% endif %}
        
        <!-- Audio trigger logic -->
        <div id="audio-blocker" style="display: none; position: absolute; inset: 0; background: transparent; z-index: 999; cursor: pointer; align-items: center; justify-content: center; flex-direction: column; gap: 15px;"></div>
        
        <script>
            // Audio System
            const hasMP3 = "{{ 'true' if vo_urls else 'false' }}" === 'true';
            const startNarrative = () => {
                if (hasMP3) {
                    setTimeout(() => document.getElementById('vo-catchy')?.play(), 1000);
                    setTimeout(() => document.getElementById('vo-heading')?.play(), 2500);
                    setTimeout(() => document.getElementById('vo-content')?.play(), 4500);
                    setTimeout(() => document.getElementById('vo-cta')?.play(), 6000);
                } else {
                    // SpeechSynthesis fallback
                    const speak = (txt, d) => setTimeout(() => {
                        let u = new SpeechSynthesisUtterance(txt);
                        speechSynthesis.speak(u);
                    }, d);
                    speak("{{ catchy_line }}", 1000);
                    speak("{{ heading }}", 2500);
                    speak("{{ content }}", 4500);
                    speak("{{ cta }}", 6000);
                }
            };
            window.addEventListener('message', (e) => {
                if (e.data && e.data.type === 'PLAY_AUDIO') startNarrative();
            });

            // GSAP Animations
            document.addEventListener('DOMContentLoaded', () => {
                gsap.set('.bento-card', { y: 100, opacity: 0 });
                gsap.set('.catchy, h1, .content', { y: 20, opacity: 0 });
                gsap.set('.cta-btn', { scale: 0.8, opacity: 0 });

                const tl = gsap.timeline({delay: 0.5});
                tl.to('.bento-card', { y: 0, opacity: 1, duration: 1, stagger: 0.2, ease: "power4.out" })
                  .to('#product-img', { scale: 1, duration: 2, ease: "power2.out" }, "-=0.8")
                  .to('.catchy', {y: 0, opacity: 1, duration: 0.6}, "-=1.5")
                  .to('h1', {y: 0, opacity: 1, duration: 0.8}, "-=1.3")
                  .to('.content', {y: 0, opacity: 1, duration: 0.6}, "-=1")
                  .to('.cta-btn', {scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.7)"}, "-=0.8");
            });
        </script>
    {% endif %}
</body>
</html>
