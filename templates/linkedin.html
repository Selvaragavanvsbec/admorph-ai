<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    .ad {
      width: 1200px; height: 628px; box-sizing: border-box;
      background: linear-gradient(140deg, {{ variant.visual.background }}, {{ variant.visual.accent }});
      color: {{ variant.visual.text_color }}; padding: 52px; position: relative;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .headline { font-size: 58px; font-weight: 800; line-height: 1.1; max-width: 920px; }
    .cta {
      align-self: flex-start; background: #ffffff; color: #111111; border-radius: 12px;
      padding: 16px 24px; font-size: 28px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="ad">
    <div class="headline">{{ variant.headline }}</div>
    <div class="cta">{{ variant.cta }}</div>
  </div>
</body>
</html>
