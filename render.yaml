services:
  - type: web
    name: admorph
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-1.5-pro
      - key: LLM_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
